# 공통 설정 파일
# 환경별 차이는 application-{profile}.yml에서 override 한다.
spring:
  application:
    name: lessonring-api

  profiles:
    default: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:your-secret-key-your-secret-key-your-secret-key}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:1209600000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

spring:
  application:
    name: lessonring-api

  datasource:
    url: jdbc:postgresql://localhost:5432/lessonring
    username: devyn
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    com.lessonring: DEBUG

jwt:
  secret: your-secret-key-your-secret-key-your-secret-key
  access-token-expiration: 3600000       # 1시간 (ms)
  refresh-token-expiration: 1209600000   # 14일 (ms)

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

pg:
  toss:
    secret-key: test_sk_xxxxx
    base-url: https://api.tosspayments.com
# 로컬 개발 환경 전용 설정
# 기본 실행과 로컬 테스트에 사용하는 프로필이다.
spring:
  config:
    activate:
      on-profile: local

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/lessonring
    username: devyn
    password:

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    com.lessonring: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG

pg:
  toss:
    base-url: https://api.tosspayments.com
    secret-key: ${PG_TOSS_SECRET_KEY:test_sk_xxxxx}

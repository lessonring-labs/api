# 로컬 개발 환경 전용 설정
# 기본 실행과 로컬 테스트에 사용하는 프로필이다.
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://43.201.114.149:5432/lessonring
    username: lessonring
    password: lessonring
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    com.lessonring: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG

pg:
  toss:
    base-url: https://api.tosspayments.com
    secret-key: ${PG_TOSS_SECRET_KEY:test_sk_xxxxx}

payment:
  webhook:
    secret: ${PAYMENT_WEBHOOK_SECRET:your-webhook-secret}
